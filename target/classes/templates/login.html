
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | GrowGenie</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="assets/css/style.css">
</head>
<body class="bg-white min-h-screen flex flex-col items-center justify-center p-4 overflow-hidden relative">
    
    <div class="absolute top-8 right-8 z-[100]">
        <select onchange="setLanguage(this.value)" class="bg-white border-2 border-dark-black rounded-xl p-3 font-bold text-sm shadow-[4px_4px_0_#b9ff66]">
            <option value="en">English 🇺🇸</option>
            <option value="hi">हिन्दी 🇮🇳</option>
            <option value="ta">தமிழ் 🇮🇳</option>
        </select>
    </div>

    <!-- Decorative background elements -->
    <div class="absolute -top-24 -left-24 w-64 h-64 bg-lime-green rounded-full opacity-20 filter blur-3xl"></div>
    <div class="absolute -bottom-24 -right-24 w-80 h-80 bg-gray-200 rounded-full opacity-30 filter blur-3xl"></div>

    <div class="relative z-10 w-full max-w-lg">
        <div class="text-center mb-10">
            <div class="flex justify-center mb-6">
                <svg class="w-12 h-12" viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path d="M20 0L40 20L20 40L0 20L20 0Z" fill="#b9ff66"/>
                    <path d="M20 10L30 20L20 30L10 20L20 10Z" fill="#191a23"/>
                </svg>
            </div>
            <h2 class="text-4xl font-bold mb-2" data-i18n="welcome_back">Welcome Back</h2>
            <p class="text-gray-500" data-i18n="sign_in_desc">Sign in to your GrowGenie account</p>
        </div>

        <div id="error-msg" class="hidden bg-red-100 border-2 border-dark-black text-dark-black p-4 rounded-2xl mb-8 text-center font-medium"></div>

        <div class="card-positivus bg-light-gray">
            <form id="login-form" class="space-y-8">
                <div>
                    <label class="block text-xl font-medium mb-3" data-i18n="email_address">Email Address</label>
                    <input type="email" id="email" required class="input-positivus text-lg" placeholder="Name@company.com" data-i18n-placeholder="email_placeholder">
                </div>
                <div>
                    <label class="block text-xl font-medium mb-3" data-i18n="password">Password</label>
                    <input type="password" id="password" required class="input-positivus text-lg" placeholder="••••••••" data-i18n-placeholder="password_placeholder">
                </div>
                <button type="submit" class="w-full btn-positivus text-xl py-5" data-i18n="sign_in">Sign In</button>
            </form>

            <p class="mt-8 text-center text-lg">
                <span data-i18n="no_account">Don't have an account?</span> <a href="register" class="badge-lime font-bold hover:bg-dark-black hover:text-white transition cursor-pointer" data-i18n="start_free_trial">Start Free Trial</a>
            </p>
        </div>
    </div>

    <script src="assets/js/app.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            applyTranslations();
        });
        checkAuth(false);
        
        document.getElementById('login-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value.trim();
            const errorMsg = document.getElementById('error-msg');
            
            const formData = new URLSearchParams();
            formData.append('action', 'login');
            formData.append('email', email);
            formData.append('password', password);

            try {
                const res = await fetch(`${API_BASE}/auth`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                    body: formData
                });
                const data = await res.json();

                if (data.status === 'success') {
                    if (data.is_admin) {
                        window.location.href = 'admin/dashboard';
                    } else {
                        window.location.href = 'dashboard';
                    }
                } else {
                    errorMsg.textContent = data.message;
                    errorMsg.classList.remove('hidden');
                }
            } catch (err) {
                errorMsg.textContent = 'Network error. Try again later.';
                errorMsg.classList.remove('hidden');
            }
        });
    </script>
</body>
</html>
