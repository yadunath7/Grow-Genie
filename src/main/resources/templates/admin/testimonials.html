
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Testimonials Management | GrowGenie</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="../assets/css/style.css">

    <style th:if="${theme_primary != null}">
        :root {
            --lime-green: [[${theme_primary}]];
            --dark-black: [[${theme_secondary}]];
        }
    </style>
</head>
<body class="bg-white text-dark-black min-h-screen flex">

    <!-- Admin Sidebar -->
    <div class="w-64 h-screen sidebar fixed top-0 left-0 flex flex-col p-6 border-r-2 border-dark-black bg-white">
        <div class="flex items-center mb-12">
            <svg class="w-8 h-8 mr-2" viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path d="M20 0L40 20L20 40L0 20L20 0Z" fill="var(--lime-green)"/>
                <path d="M20 10L30 20L20 30L10 20L20 10Z" fill="var(--dark-black)"/>
            </svg>
            <h1 class="text-2xl font-black uppercase tracking-tighter">Admin</h1>
        </div>
        <nav class="flex-1 space-y-2">
            <a href="dashboard" class="nav-item flex items-center p-4 font-bold text-lg hover:bg-light-gray transition-all"><span>Dashboard</span></a>
            <a href="users" class="nav-item flex items-center p-4 font-bold text-lg hover:bg-light-gray transition-all">
                <span>Users</span>
            </a>
            <a href="subscriptions" class="nav-item flex items-center p-4 font-bold text-lg hover:bg-light-gray transition-all">
                <span>Subscriptions</span>
            </a>
            <a href="platform_products" class="nav-item flex items-center p-4 font-bold text-lg hover:bg-light-gray transition-all">
                <span>Products</span>
            </a>
            <a href="testimonials" class="nav-item active flex items-center p-4 font-bold text-lg bg-lime-green border-2 border-dark-black rounded-2xl shadow-[4px_4px_0_var(--dark-black)]"><span>Testimonials</span></a>
            <a href="team" class="nav-item flex items-center p-4 font-bold text-lg hover:bg-light-gray transition-all"><span>Team</span></a>
            <a href="settings" class="nav-item flex items-center p-4 font-bold text-lg hover:bg-light-gray transition-all"><span>Settings</span></a>
        </nav>
        <div class="mt-auto"><a href="logout" class="flex items-center p-4 font-bold text-lg text-red-600 hover:bg-red-50 rounded-2xl transition-all"><span>Logout</span></a></div>
    </div>

    <main class="flex-1 ml-64 p-8 md:p-12">
        <header class="flex justify-between items-center mb-12">
            <div>
                <h2 class="text-5xl font-black uppercase">Testimonials</h2>
                <p class="text-xl text-gray-600 font-medium">Manage user feedback displayed on the site.</p>
            </div>
        </header>

        <!-- Add Form -->
        <div class="card-positivus mb-12">
            <h3 class="text-2xl font-black uppercase mb-6">Add New Testimonial</h3>
            <form method="POST" class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <div>
                    <label class="block text-sm font-black uppercase mb-2">User Name</label>
                    <input type="text" name="name" required class="w-full bg-white border-2 border-dark-black rounded-2xl px-6 py-4 font-bold focus:shadow-[6px_6px_0_var(--lime-green)] focus:outline-none transition-all">
                </div>
                <div>
                    <label class="block text-sm font-black uppercase mb-2">Role/Position</label>
                    <input type="text" name="role" required class="w-full bg-white border-2 border-dark-black rounded-2xl px-6 py-4 font-bold focus:shadow-[6px_6px_0_var(--lime-green)] focus:outline-none transition-all">
                </div>
                <div class="md:col-span-2">
                    <label class="block text-sm font-black uppercase mb-2">Content</label>
                    <textarea name="content" required rows="3" class="w-full bg-white border-2 border-dark-black rounded-2xl px-6 py-4 font-bold focus:shadow-[6px_6px_0_var(--lime-green)] focus:outline-none transition-all"></textarea>
                </div>
                <div class="md:col-span-2">
                    <button type="submit" name="add" class="btn-positivus px-12">Save Testimonial</button>
                </div>
            </form>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
            
            <div th:each="testimonial : ${testimonials}" class="card-positivus relative group">
                <div class="flex justify-between items-start mb-4">
                    <div>
                        <h4 class="text-xl font-black uppercase" th:text="${testimonial.name}"></h4>
                        <p class="text-lime-green font-bold text-sm uppercase" th:text="${testimonial.role}"></p>
                    </div>
                    <a th:href="@{/admin/testimonials(delete=${testimonial.id})}" onclick="return confirm('Delete this?')" class="text-red-500 hover:text-red-700 transition-colors">
                        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path></svg>
                    </a>
                </div>
                <p class="text-gray-600 font-medium italic" th:text="${testimonial.content}"></p>
            </div>
            
        </div>
    </main>
</body>
</html>
