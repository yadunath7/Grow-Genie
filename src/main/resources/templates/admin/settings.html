
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Global Settings | Admin | GrowGenie</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="../assets/css/style.css">
    <style th:if="${theme_primary != null}">
        :root {
            --lime-green: [[${theme_primary}]];
            --dark-black: [[${theme_secondary}]];
        }
    </style>
</head>
<body class="bg-white text-dark-black min-h-screen flex">

    <!-- Admin Sidebar -->
    <div class="w-64 h-screen sidebar fixed top-0 left-0 flex flex-col p-6 border-r-2 border-dark-black bg-white">
        <div class="flex items-center mb-12">
            <svg class="w-8 h-8 mr-2" viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path d="M20 0L40 20L20 40L0 20L20 0Z" fill="var(--lime-green)"/>
                <path d="M20 10L30 20L20 30L10 20L20 10Z" fill="var(--dark-black)"/>
            </svg>
            <h1 class="text-2xl font-black uppercase tracking-tighter">Admin</h1>
        </div>
        <nav class="flex-1 space-y-2">
            <a href="dashboard" class="nav-item flex items-center p-4 font-bold text-lg hover:bg-light-gray transition-all"><span>Dashboard</span></a>
            <a href="users" class="nav-item flex items-center p-4 font-bold text-lg hover:bg-light-gray transition-all">
                <span>Users</span>
            </a>
            <a href="subscriptions" class="nav-item flex items-center p-4 font-bold text-lg hover:bg-light-gray transition-all">
                <span>Subscriptions</span>
            </a>
            <a href="platform_products" class="nav-item flex items-center p-4 font-bold text-lg hover:bg-light-gray transition-all">
                <span>Products</span>
            </a>
            <a href="testimonials" class="nav-item flex items-center p-4 font-bold text-lg hover:bg-light-gray transition-all"><span>Testimonials</span></a>
            <a href="team" class="nav-item flex items-center p-4 font-bold text-lg hover:bg-light-gray transition-all"><span>Team</span></a>
            <a href="settings" class="nav-item active flex items-center p-4 font-bold text-lg bg-lime-green border-2 border-dark-black rounded-2xl shadow-[4px_4px_0_var(--dark-black)]"><span>Settings</span></a>
        </nav>
        <div class="mt-auto"><a href="logout" class="flex items-center p-4 font-bold text-lg text-red-600 hover:bg-red-50 rounded-2xl transition-all"><span>Logout</span></a></div>
    </div>

    <main class="flex-1 ml-64 p-8 md:p-12">
        <header class="flex justify-between items-center mb-12">
            <div>
                <h2 class="text-5xl font-black uppercase">Global Settings</h2>
                <p class="text-xl text-gray-600 font-medium">Update API keys and platform configuration.</p>
            </div>
        </header>

        <div th:if="${success_msg}" class="bg-lime-green border-2 border-dark-black p-6 rounded-2xl mb-8 shadow-[4px_4px_0_var(--dark-black)] font-black uppercase">
            <p th:text="${success_msg}"></p>
        </div>

        <form method="POST" class="space-y-8 max-w-4xl">
            <!-- General -->
            <div class="card-positivus">
                <h3 class="text-2xl font-black uppercase mb-6">General Configuration</h3>
                <div class="space-y-6">
                    <div>
                        <label class="block text-sm font-black uppercase mb-2">Site Title</label>
                        <input type="text" name="site_title" th:value="${settings['site_title']}" class="w-full bg-white border-2 border-dark-black rounded-2xl px-6 py-4 font-bold focus:shadow-[6px_6px_0_var(--lime-green)] focus:outline-none transition-all">
                    </div>
                </div>
            </div>

            <!-- Content Management -->
            <div class="card-positivus">
                <h3 class="text-2xl font-black uppercase mb-6">Content Management</h3>
                <div class="space-y-6">
                    <div>
                        <label class="block text-sm font-black uppercase mb-2">Landing Page Hero Title</label>
                        <input type="text" name="landing_hero_title" th:value="${settings['landing_hero_title']}" placeholder="Navigating the startup landscape for success" class="w-full bg-white border-2 border-dark-black rounded-2xl px-6 py-4 font-bold focus:shadow-[6px_6px_0_var(--lime-green)] focus:outline-none transition-all">
                    </div>
                    <div>
                        <label class="block text-sm font-black uppercase mb-2">Landing Page Subtitle</label>
                        <textarea name="landing_hero_subtitle" placeholder="Our startup assistant helps founders..." class="w-full bg-white border-2 border-dark-black rounded-2xl px-6 py-4 font-medium focus:shadow-[6px_6px_0_var(--lime-green)] focus:outline-none transition-all h-24" th:text="${settings['landing_hero_subtitle']}"></textarea>
                    </div>
                    <div>
                        <label class="block text-sm font-black uppercase mb-2">About Us Title</label>
                        <input type="text" name="about_title" th:value="${settings['about_title']}" placeholder="We are the architects of startup success" class="w-full bg-white border-2 border-dark-black rounded-2xl px-6 py-4 font-bold focus:shadow-[6px_6px_0_var(--lime-green)] focus:outline-none transition-all">
                    </div>
                    <div>
                        <label class="block text-sm font-black uppercase mb-2">About Us Content</label>
                        <textarea name="about_content" placeholder="GrowGenie was founded on a simple belief..." class="w-full bg-white border-2 border-dark-black rounded-2xl px-6 py-4 font-medium focus:shadow-[6px_6px_0_var(--lime-green)] focus:outline-none transition-all h-32" th:text="${settings['about_content']}"></textarea>
                    </div>
                </div>
            </div>

            <!-- API Keys -->
            <div class="card-positivus">
                <h3 class="text-2xl font-black uppercase mb-6">API & Credentials</h3>
                <div class="space-y-6">
                    <div>
                        <label class="block text-sm font-black uppercase mb-2">Groq API Key (AI Voice/Planner)</label>
                        <input type="text" name="groq_api_key" th:value="${settings['groq_api_key']}" class="w-full bg-white border-2 border-dark-black rounded-2xl px-6 py-4 font-mono text-sm focus:shadow-[6px_6px_0_var(--lime-green)] focus:outline-none transition-all">
                    </div>
                    
                    <div>
                        <label class="block text-sm font-black uppercase mb-2">Brevo API Key (Emails)</label>
                        <input type="password" name="brevo_api_key" th:value="${settings['brevo_api_key']}" class="w-full bg-white border-2 border-dark-black rounded-2xl px-6 py-4 font-mono text-sm focus:shadow-[6px_6px_0_var(--lime-green)] focus:outline-none transition-all">
                    </div>

                    <div>
                        <label class="block text-sm font-black uppercase mb-2">Razorpay Key ID</label>
                        <input type="text" name="razorpay_key_id" th:value="${settings['razorpay_key_id']}" class="w-full bg-white border-2 border-dark-black rounded-2xl px-6 py-4 font-mono text-sm focus:shadow-[6px_6px_0_var(--lime-green)] focus:outline-none transition-all">
                    </div>
                    <div>
                        <label class="block text-sm font-black uppercase mb-2">Razorpay Secret Key</label>
                        <input type="password" name="razorpay_key_secret" th:value="${settings['razorpay_key_secret']}" class="w-full bg-white border-2 border-dark-black rounded-2xl px-6 py-4 font-mono text-sm focus:shadow-[6px_6px_0_var(--lime-green)] focus:outline-none transition-all">
                    </div>
                </div>
            </div>

            <!-- Feature Toggles -->
            <div class="card-positivus">
                <h3 class="text-2xl font-black uppercase mb-6">Feature Toggles</h3>
                <div class="space-y-6">
                    <div class="flex items-center justify-between">
                        <span class="font-bold uppercase">Voice Assistant</span>
                        <select name="enable_voice_assistant" class="bg-white border-2 border-dark-black rounded-xl p-2 font-black">
                            <option value="1" th:selected="${settings['enable_voice_assistant'] == '1'}">ENABLED</option>
                            <option value="0" th:selected="${settings['enable_voice_assistant'] == '0'}">DISABLED</option>
                        </select>
                    </div>
                    <div class="flex items-center justify-between">
                        <span class="font-bold uppercase">Marketing Module</span>
                        <select name="enable_marketing_module" class="bg-white border-2 border-dark-black rounded-xl p-2 font-black">
                            <option value="1" th:selected="${settings['enable_marketing_module'] == '1'}">ENABLED</option>
                            <option value="0" th:selected="${settings['enable_marketing_module'] == '0'}">DISABLED</option>
                        </select>
                    </div>
                </div>
            </div>

            <!-- UI Theme -->
            <div class="card-positivus">
                <h3 class="text-2xl font-black uppercase mb-6">UI Theme</h3>
                <div class="space-y-6">
                    <div class="flex items-center justify-between">
                        <span class="font-bold uppercase">Global Theme</span>
                        <select name="ui_theme" class="bg-white border-2 border-dark-black rounded-xl p-2 font-black">
                            <option value="classic" th:selected="${settings['ui_theme'] == null || settings['ui_theme'] == 'classic'}">Classic Positivus (Lime)</option>
                            <option value="ocean_blue" th:selected="${settings['ui_theme'] == 'ocean_blue'}">Ocean Blue</option>
                            <option value="cyberpunk" th:selected="${settings['ui_theme'] == 'cyberpunk'}">Cyberpunk Purple</option>
                            <option value="sunset" th:selected="${settings['ui_theme'] == 'sunset'}">Sunset Orange</option>
                            <option value="ruby_red" th:selected="${settings['ui_theme'] == 'ruby_red'}">Ruby Red</option>
                        </select>
                    </div>
                </div>
            </div>

            <button type="submit" class="btn-positivus w-full py-6 text-2xl">SAVE ALL SETTINGS</button>
        </form>
    </main>
</body>
</html>
