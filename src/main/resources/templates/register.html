
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register | GrowGenie</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="assets/css/style.css">

    <style th:if="${theme_primary != null}">
        :root {
            --lime-green: [[${theme_primary}]];
            --dark-black: [[${theme_secondary}]];
        }
    </style>
</head>
<body class="bg-white min-h-screen flex items-center justify-center p-4 overflow-hidden relative">

    <!-- Decorative background elements -->
    <div class="absolute -top-24 -right-24 w-64 h-64 bg-lime-green rounded-full opacity-20 filter blur-3xl"></div>
    <div class="absolute -bottom-24 -left-24 w-80 h-80 bg-gray-200 rounded-full opacity-30 filter blur-3xl"></div>

    <div class="relative z-10 w-full max-w-lg">
        <div class="text-center mb-10">
            <div class="flex justify-center mb-6">
                <svg class="w-12 h-12" viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path d="M20 0L40 20L20 40L0 20L20 0Z" fill="var(--lime-green)"/>
                    <path d="M20 10L30 20L20 30L10 20L20 10Z" fill="var(--dark-black)"/>
                </svg>
            </div>
            <h2 class="text-4xl font-bold mb-2">Create Account</h2>
            <p class="text-gray-500">Start your 5-day free premium trial</p>
        </div>

        <div id="error-msg" class="hidden bg-red-100 border-2 border-dark-black text-dark-black p-4 rounded-2xl mb-8 text-center font-medium"></div>

        <div class="card-positivus bg-light-gray">
            <form id="register-form" class="space-y-6">
                <div>
                    <label class="block text-lg font-medium mb-2">Full Name</label>
                    <input type="text" id="name" required class="input-positivus" placeholder="John Doe">
                </div>
                <div>
                    <label class="block text-lg font-medium mb-2">Email Address</label>
                    <input type="email" id="email" required class="input-positivus" placeholder="Name@company.com">
                </div>
                <div>
                    <label class="block text-lg font-medium mb-2">Password</label>
                    <input type="password" id="password" required class="input-positivus" placeholder="••••••••">
                </div>
                <button type="submit" class="w-full btn-positivus text-xl py-5">Start Free Trial</button>
            </form>

            <p class="mt-8 text-center text-lg">
                Already have an account? <a href="login" class="badge-lime font-bold hover:bg-dark-black hover:text-white transition cursor-pointer">Sign In</a>
            </p>
        </div>
    </div>

    <script src="assets/js/app.js"></script>
    <script>
        checkAuth(false);
        
        document.getElementById('register-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const name = document.getElementById('name').value;
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const errorMsg = document.getElementById('error-msg');
            
            const formData = new URLSearchParams();
            formData.append('action', 'register');
            formData.append('name', name);
            formData.append('email', email);
            formData.append('password', password);

            try {
                const res = await fetch(`${API_BASE}/auth`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                    body: formData
                });
                const data = await res.json();

                if (data.status === 'success') {
                    // Show success message, then redirect to login
                    errorMsg.style.background = 'var(--lime-green)';
                    errorMsg.style.borderColor = 'var(--dark-black)';
                    errorMsg.textContent = '✅ Account created! Redirecting to login...';
                    errorMsg.classList.remove('hidden');
                    setTimeout(() => { window.location.href = 'login'; }, 1500);
                } else {
                    errorMsg.style.background = '';
                    errorMsg.style.borderColor = '';
                    errorMsg.textContent = data.message;
                    errorMsg.classList.remove('hidden');
                }
            } catch (err) {
                errorMsg.textContent = 'Network error. Try again later.';
                errorMsg.classList.remove('hidden');
            }
        });
    </script>
</body>
</html>
